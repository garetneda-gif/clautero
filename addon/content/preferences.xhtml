<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <!-- Claude API Section -->
  <groupbox>
    <label><html:h3 data-l10n-id="pref-section-api"></html:h3></label>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-api-key"
        data-l10n-id="pref-api-key"
      ></html:label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-api-key"
        preference="apiKey"
        data-l10n-id="pref-api-key-placeholder"
        style="flex: 1;"
      />
    </hbox>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-model"
        data-l10n-id="pref-model"
      ></html:label>
      <menulist
        id="zotero-prefpane-__addonRef__-model"
        preference="model"
      >
        <menupopup>
          <menuitem label="Claude Sonnet 4.5" value="claude-sonnet-4-5-20250514" />
          <menuitem label="Claude Haiku 4.5" value="claude-haiku-4-5-20250514" />
        </menupopup>
      </menulist>
    </hbox>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-proxy-port"
        data-l10n-id="pref-proxy-port"
      ></html:label>
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-proxy-port"
        preference="proxyPort"
        style="width: 100px;"
      />
    </hbox>
  </groupbox>

  <!-- Context Section -->
  <groupbox>
    <label><html:h3 data-l10n-id="pref-section-context"></html:h3></label>

    <checkbox
      id="zotero-prefpane-__addonRef__-auto-context"
      preference="autoContext"
      data-l10n-id="pref-auto-context"
    />
  </groupbox>

  <!-- Obsidian Bridge Section -->
  <groupbox>
    <label><html:h3 data-l10n-id="pref-section-obsidian"></html:h3></label>

    <checkbox
      id="zotero-prefpane-__addonRef__-obsidian-enabled"
      preference="obsidian.enabled"
      data-l10n-id="pref-obsidian-enabled"
    />

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-obsidian-api-key"
        data-l10n-id="pref-obsidian-api-key"
      ></html:label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-obsidian-api-key"
        preference="obsidian.apiKey"
        style="flex: 1;"
      />
    </hbox>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-obsidian-vault-prefix"
        data-l10n-id="pref-obsidian-vault-prefix"
      ></html:label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-obsidian-vault-prefix"
        preference="obsidian.vaultPrefix"
        style="flex: 1;"
      />
    </hbox>
  </groupbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
