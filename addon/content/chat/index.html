<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clautero</title>
    <link rel="stylesheet" href="chat.css" />
  </head>
  <body>
    <div class="claudian-container">
      <!-- Header -->
      <div class="claudian-header">
        <div class="claudian-header-title">
          <div class="claudian-logo">
            <img
              src="claude-logo.svg"
              alt="Claude logo"
              width="18"
              height="18"
            />
          </div>
          <h4>Clautero</h4>
        </div>
        <div class="claudian-header-controls">
          <button class="claudian-clear-btn" id="new-chat-btn" title="新建对话">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <button class="claudian-clear-btn" id="history-btn" title="历史记录">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </button>
        </div>
      </div>

      <!-- History Panel (toggleable) -->
      <div class="claudian-history-panel" id="history-panel"></div>

      <!-- Messages -->
      <div class="claudian-messages" id="message-list">
        <!-- Welcome screen will be dynamically inserted by JS -->
      </div>

      <!-- Input Wrapper -->
      <div class="claudian-input-wrapper" id="input-wrapper">
        <div class="claudian-resize-handle" id="resize-handle"></div>
        <div class="claudian-input-area">
          <div class="claudian-input-container">
            <textarea
              class="claudian-input"
              id="chat-input"
              placeholder="输入您的消息..."
              rows="1"
            ></textarea>
            <!-- Slash command popup (hidden by default) -->
            <div
              class="slash-command-popup"
              id="slash-popup"
              style="display: none"
            ></div>
          </div>
          <button
            class="claudian-send-btn"
            id="send-btn"
            type="button"
            aria-label="发送消息"
            title="发送消息"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M22 2L11 13"></path>
              <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script src="chat.js"></script>
  </body>
</html>
